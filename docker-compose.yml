services:

  # ---------- Zookeeper: Kafka's coordinator ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chemstream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - chemstream-net

  # ---------- Kafka broker: the message bus ----------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chemstream-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"      # for clients on your laptop (host)
      - "29092:29092"    # for clients inside docker network (other containers)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Two listeners: one for inside the docker network, one for your host machine
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Single-broker tuning (don't use these in production)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Retain messages for 7 days
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - chemstream-net
  # ---------- TimescaleDB: time-series storage ----------
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: chemstream-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - chemstream-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  chemstream-net:
    driver: bridge

volumes:
  timescale_data: